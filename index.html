<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NovaLaunch — Modern React Landing Page (No NPM)</title>
    <meta name="description" content="A modern, mobile-first React landing page you can deploy to Vercel without npm. Includes dark mode, pricing, testimonials, FAQ, and smooth animations." />

    <!-- Open Graph -->
    <meta property="og:title" content="NovaLaunch — Modern React Landing Page" />
    <meta property="og:description" content="Deployable on Vercel with zero npm. Modern sections, dark mode, and animations." />
    <meta property="og:type" content="website" />

    <!-- Favicon (inline SVG as data URL) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%2322c55e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M32 4l10 20 22 3-16 15 4 22-20-10-20 10 4-22L0 27l22-3z'/%3E%3C/svg%3E" />

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Tailwind config (CDN mode)
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: [
                'ui-sans-serif',
                'system-ui',
                '-apple-system',
                'Segoe UI',
                'Roboto',
                'Helvetica',
                'Arial',
                'Apple Color Emoji',
                'Segoe UI Emoji'
              ]
            },
            colors: {
              brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81'
              }
            }
          }
        }
      };
    </script>

    <link rel="stylesheet" href="./styles.css" />

    <!-- React 18 (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (for JSX in-browser; no build step) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body class="bg-slate-950 text-slate-100 antialiased">
    <!-- Background -->
    <div aria-hidden="true" class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="aurora"></div>
      <div class="noise"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel" src="./app.jsx"></script>
  </body>
</html>
