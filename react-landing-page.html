<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KPZ — Strategy & Growth</title>

  <!-- ═══════════════════════════════════════════════
       React 18 + Babel Standalone via CDN
       ➜ Zero npm • Zero node_modules • Zero installs
  ════════════════════════════════════════════════ -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #0a0f1e;
      --dark:   #0d1528;
      --card:   #111827;
      --accent: #6366f1;
      --accent2:#8b5cf6;
      --teal:   #06b6d4;
      --green:  #10b981;
      --orange: #f59e0b;
      --text:   #e2e8f0;
      --muted:  #94a3b8;
      --border: rgba(99,102,241,0.18);
      --glass:  rgba(255,255,255,0.04);
      --glow:   rgba(99,102,241,0.35);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    img { max-width: 100%; }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* ── Keyframes ─────────────────────────────── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes float    { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-14px); } }
    @keyframes pulse    { 0%,100% { opacity:.6; transform:scale(1); } 50% { opacity:1; transform:scale(1.08); } }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes gradMove { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
    @keyframes slideIn  { from { transform:translateX(-100%); } to { transform:translateX(0); } }
    @keyframes glow     { 0%,100% { box-shadow:0 0 20px var(--glow); } 50% { box-shadow:0 0 50px var(--glow),0 0 80px rgba(139,92,246,.2); } }

    /* ── NAVBAR ────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 68px;
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      transition: all .3s ease;
    }
    .navbar.scrolled {
      background: rgba(10,15,30,0.97);
      box-shadow: 0 4px 30px rgba(0,0,0,.4);
    }
    .nav-logo {
      font-size: 1.5rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 2.2rem; align-items: center; }
    .nav-links a {
      font-size: .9rem; font-weight: 500; color: var(--muted);
      transition: color .25s; position: relative;
    }
    .nav-links a::after {
      content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px;
      background: var(--accent); transition: width .3s ease;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      padding: .5rem 1.4rem; border-radius: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff !important; font-weight: 600; font-size: .85rem;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 0 20px var(--glow);
    }
    .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--glow); }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: all .3s;
    }
    .mobile-menu {
      display: none; position: fixed; top: 68px; left: 0; right: 0;
      background: rgba(10,15,30,0.98); backdrop-filter: blur(18px);
      padding: 1.5rem 5%; flex-direction: column; gap: 1.2rem;
      border-bottom: 1px solid var(--border); z-index: 999;
      animation: slideIn .3s ease;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-size: 1rem; color: var(--muted); font-weight: 500; transition: color .2s; }
    .mobile-menu a:hover { color: var(--text); }

    /* ── HERO ──────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: 100px 5% 60px;
      position: relative; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,.25) 0%, transparent 65%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,.15) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 20% 90%, rgba(139,92,246,.1) 0%, transparent 55%);
    }
    .hero-grid {
      position: absolute; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(99,102,241,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    .hero-orb {
      position: absolute; border-radius: 50%; filter: blur(80px);
      animation: float 6s ease-in-out infinite;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(99,102,241,.18); top: 10%; left: -5%; }
    .orb2 { width: 300px; height: 300px; background: rgba(6,182,212,.12); bottom: 10%; right: -3%; animation-delay: -3s; }
    .hero-content { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; animation: fadeUp .9s ease both; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .4rem 1.1rem; border-radius: 50px;
      background: var(--glass); border: 1px solid var(--border);
      font-size: .8rem; font-weight: 600; color: var(--accent);
      letter-spacing: .5px; margin-bottom: 1.8rem;
      backdrop-filter: blur(10px);
    }
    .badge-dot { width:7px; height:7px; border-radius:50%; background: var(--green); animation: pulse 2s infinite; }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 6vw, 5.2rem);
      font-weight: 800; line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 50%, var(--accent2) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: gradMove 4s ease infinite;
    }
    .hero p {
      font-size: clamp(1rem, 2vw, 1.2rem); color: var(--muted);
      max-width: 600px; margin: 0 auto 2.5rem;
      line-height: 1.8;
    }
    .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: .85rem 2.2rem; border-radius: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-weight: 700; font-size: 1rem;
      border: none; cursor: pointer;
      box-shadow: 0 0 30px var(--glow);
      transition: transform .2s, box-shadow .2s;
      animation: glow 3s ease-in-out infinite;
    }
    .btn-primary:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 40px var(--glow); }
    .btn-secondary {
      padding: .85rem 2.2rem; border-radius: 50px;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text); font-weight: 600; font-size: 1rem;
      cursor: pointer; transition: all .25s;
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .hero-stats {
      display: flex; justify-content: center; gap: 3rem;
      margin-top: 3.5rem; flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-label { font-size: .8rem; color: var(--muted); font-weight: 500; letter-spacing: .5px; }
    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      color: var(--muted); font-size: .75rem; letter-spacing: 1px;
      animation: fadeIn 2s ease 1.5s both;
    }
    .scroll-hint::after {
      content: ''; width: 1px; height: 50px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: pulse 2s infinite;
    }

    /* ── SECTION SHARED ────────────────────────── */
    section { padding: 100px 5%; }
    .section-tag {
      display: inline-block;
      font-size: .78rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: .8rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 800; line-height: 1.2; margin-bottom: 1rem;
    }
    .section-title span {
      background: linear-gradient(135deg, var(--accent), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .section-sub { color: var(--muted); font-size: 1.05rem; max-width: 560px; line-height: 1.8; }

    /* ── SERVICES ──────────────────────────────── */
    .services { background: var(--dark); }
    .services-header { text-align: center; margin-bottom: 4rem; }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem; max-width: 1200px; margin: 0 auto;
    }
    .service-card {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.2rem;
      transition: transform .3s, border-color .3s, box-shadow .3s;
      position: relative; overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .service-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--teal));
      transform: scaleX(0); transition: transform .3s ease;
      transform-origin: left;
    }
    .service-card:hover::before { transform: scaleX(1); }
    .service-card:hover {
      transform: translateY(-8px);
      border-color: rgba(99,102,241,.4);
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 30px rgba(99,102,241,.1);
    }
    .service-icon {
      width: 56px; height: 56px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 1.4rem;
    }
    .service-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: .7rem; }
    .service-card p { color: var(--muted); font-size: .92rem; line-height: 1.7; }
    .service-arrow {
      display: inline-flex; align-items: center; gap: .4rem;
      margin-top: 1.2rem; font-size: .85rem; font-weight: 600;
      color: var(--accent); transition: gap .2s;
    }
    .service-card:hover .service-arrow { gap: .7rem; }

    /* ── ABOUT ─────────────────────────────────── */
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: center; max-width: 1200px; margin: 0 auto;
    }
    .about-visual {
      position: relative; display: flex;
      align-items: center; justify-content: center;
    }
    .about-blob {
      width: 380px; height: 380px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(99,102,241,.25), rgba(6,182,212,.1) 60%, transparent);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      position: relative; animation: float 5s ease-in-out infinite;
    }
    .about-inner {
      text-align: center;
      background: var(--card); border-radius: 20px;
      padding: 2rem 2.5rem; border: 1px solid var(--border);
    }
    .about-inner .big-num {
      font-family: 'Playfair Display', serif;
      font-size: 4rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .about-inner p { color: var(--muted); font-size: .9rem; }
    .about-chips { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: 2rem; }
    .chip {
      padding: .35rem .9rem; border-radius: 50px;
      background: rgba(99,102,241,.12); border: 1px solid var(--border);
      font-size: .8rem; font-weight: 600; color: var(--accent);
    }
    .feature-list { display: flex; flex-direction: column; gap: 1.2rem; margin: 2rem 0; }
    .feature-item { display: flex; gap: 1rem; align-items: flex-start; }
    .feature-check {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; flex-shrink: 0; margin-top: 2px;
    }
    .feature-item h4 { font-size: .95rem; font-weight: 600; margin-bottom: .2rem; }
    .feature-item p { color: var(--muted); font-size: .85rem; line-height: 1.6; }

    /* ── PROCESS ─────────────────────────────── */
    .process { background: var(--dark); }
    .process-header { text-align: center; margin-bottom: 4rem; }
    .process-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem; max-width: 1100px; margin: 0 auto;
      position: relative;
    }
    .process-steps::before {
      content: ''; position: absolute;
      top: 40px; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 0;
    }
    .step-card {
      text-align: center; padding: 2rem 1.5rem;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 20px; position: relative; z-index: 1;
      transition: transform .3s, box-shadow .3s;
    }
    .step-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(0,0,0,.3); }
    .step-num {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.1rem;
      margin: 0 auto 1.2rem;
      box-shadow: 0 0 20px var(--glow);
    }
    .step-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: .6rem; }
    .step-card p { color: var(--muted); font-size: .85rem; line-height: 1.6; }

    /* ── TESTIMONIALS ─────────────────────────── */
    .testimonials-header { text-align: center; margin-bottom: 3.5rem; }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem; max-width: 1100px; margin: 0 auto;
    }
    .testi-card {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem;
      transition: transform .3s, border-color .3s;
      position: relative; overflow: hidden;
    }
    .testi-card::after {
      content: '"'; position: absolute;
      top: 1rem; right: 1.5rem;
      font-size: 5rem; font-family: 'Playfair Display', serif;
      color: rgba(99,102,241,.12); line-height: 1;
    }
    .testi-card:hover { transform: translateY(-5px); border-color: rgba(99,102,241,.35); }
    .stars { color: var(--orange); font-size: .9rem; margin-bottom: 1rem; }
    .testi-card p { color: var(--muted); font-size: .9rem; line-height: 1.75; margin-bottom: 1.5rem; }
    .testi-author { display: flex; align-items: center; gap: .9rem; }
    .author-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .95rem; color: #fff; flex-shrink: 0;
    }
    .author-name { font-weight: 700; font-size: .9rem; }
    .author-role { color: var(--muted); font-size: .8rem; }

    /* ── CONTACT ──────────────────────────────── */
    .contact { background: var(--dark); }
    .contact-wrap {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; align-items: start;
    }
    .contact-info h2 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,3vw,2.5rem); font-weight:800; margin-bottom:1rem; }
    .contact-info p { color:var(--muted); line-height:1.8; margin-bottom:2rem; }
    .contact-item { display:flex; gap:1rem; align-items:flex-start; margin-bottom:1.4rem; }
    .contact-icon {
      width:44px; height:44px; border-radius:12px;
      background:rgba(99,102,241,.12); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0;
    }
    .contact-item h4 { font-size:.88rem; font-weight:600; margin-bottom:.15rem; }
    .contact-item p { color:var(--muted); font-size:.85rem; line-height:1.5; margin:0; }
    .contact-form {
      background: var(--glass); border:1px solid var(--border);
      border-radius:24px; padding:2.5rem; backdrop-filter:blur(10px);
    }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
    .form-group { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
    .form-group label { font-size:.82rem; font-weight:600; color:var(--muted); }
    .form-group input,
    .form-group textarea,
    .form-group select {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 12px; padding: .8rem 1rem;
      color: var(--text); font-family: inherit; font-size: .92rem;
      transition: border-color .25s, box-shadow .25s; outline: none;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .form-group select option { background: var(--dark); }
    .form-group textarea { min-height: 110px; }
    .btn-submit {
      width: 100%; padding: 1rem;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px var(--glow);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--glow); }
    .success-msg {
      text-align:center; padding:1rem;
      color: var(--green); font-weight:600; font-size:.95rem;
      background: rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25);
      border-radius:12px; margin-top:.8rem;
    }

    /* ── FOOTER ───────────────────────────────── */
    footer {
      background: var(--navy); border-top: 1px solid var(--border);
      padding: 4rem 5% 2rem;
    }
    .footer-grid {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 3rem; max-width: 1200px; margin: 0 auto 3rem;
    }
    .footer-brand p { color: var(--muted); font-size: .88rem; line-height: 1.8; margin: .9rem 0 1.5rem; }
    .footer-socials { display: flex; gap: .7rem; }
    .social-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--glass); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: all .2s; cursor: pointer;
    }
    .social-btn:hover {
      background: rgba(99,102,241,.2); border-color: var(--accent);
      transform: translateY(-2px);
    }
    .footer-col h4 { font-size: .88rem; font-weight: 700; margin-bottom: 1.2rem; color: var(--text); }
    .footer-col ul { display: flex; flex-direction: column; gap: .7rem; }
    .footer-col ul a { color: var(--muted); font-size: .85rem; transition: color .2s; }
    .footer-col ul a:hover { color: var(--accent); }
    .footer-bottom {
      max-width: 1200px; margin: 0 auto;
      padding-top: 2rem; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-bottom p { color: var(--muted); font-size: .8rem; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: var(--muted); font-size: .8rem; transition: color .2s; }
    .footer-links a:hover { color: var(--accent); }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 900px) {
      .about-grid { grid-template-columns: 1fr; gap: 3rem; }
      .about-visual { display: none; }
      .contact-wrap { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
      .process-steps::before { display: none; }
      .nav-links { display: none; }

    @media (max-width: 600px) {

<body>
  <div id="root"></div>

  <!-- ═══════════════════════════════════════════

  <script type="text/babel">

      },
      {

        stars: 5,

    /* ── Navbar ──────────────────────────────── */
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const links = [
        { label: 'Services', href: '#services' },
        { label: 'About',    href: '#about'    },
        { label: 'Process',  href: '#process'  },
        { label: 'Reviews',  href: '#reviews'  },
      ];

      return (
        <>
          <nav className={`navbar${scrolled ? ' scrolled' : ''}`}>
            <a href="#" className="nav-logo">KPZ</a>

            <div className="nav-links">
              {links.map(l => (
                <a key={l.label} href={l.href}>{l.label}</a>
              ))}
              <a href="#contact" className="nav-cta">Get Started</a>
            </div>

            <button className="hamburger" onClick={() => setMobileOpen(o => !o)} aria-label="Menu">
              <span style={{ transform: mobileOpen ? 'rotate(45deg) translate(5px,5px)' : 'none' }} />
              <span style={{ opacity: mobileOpen ? 0 : 1 }} />
              <span style={{ transform: mobileOpen ? 'rotate(-45deg) translate(5px,-5px)' : 'none' }} />
            </button>
          </nav>

          <div className={`mobile-menu${mobileOpen ? ' open' : ''}`}>
            {links.map(l => (
              <a key={l.label} href={l.href} onClick={() => setMobileOpen(false)}>{l.label}</a>

              Get Started
            </a>
          </div>
        </>
      );
    }

    /* ── Hero ────────────────────────────────── */
    function Hero() {
      return (
        <section className="hero" id="home">
          <div className="hero-bg" />
          <div className="hero-grid" />
          <div className="hero-orb orb1" />
          <div className="hero-orb orb2" />

          <div className="hero-content">
            <div className="hero-badge">
              <span className="badge-dot" />
              Trusted by 200+ businesses worldwide
            </div>

            <h1>
              We Build<br/>
              <span>Strategies That</span><br/>
              Actually Work
            </h1>

            <p>
              Expert consulting, digital transformation, and growth strategies
              tailored to your vision — so you can scale with confidence and clarity.
            </p>

            <div className="hero-actions">
              <button className="btn-primary" onClick={() => document.getElementById('contact').scrollIntoView({behavior:'smooth'})}>
                Start Your Journey ↗
              </button>
              <button className="btn-secondary" onClick={() => document.getElementById('services').scrollIntoView({behavior:'smooth'})}>
                View Services
              </button>
            </div>

            <div className="hero-stats">
              {[
                { num: '200+', label: 'CLIENTS SERVED' },
                { num: '94%',  label: 'SUCCESS RATE'   },
                { num: '10+',  label: 'YEARS EXPERIENCE'},
                { num: '3×',   label: 'AVG. ROI'        },
              ].map(s => (
                <div className="stat" key={s.label}>
                  <div className="stat-num">{s.num}</div>
                  <div className="stat-label">{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="scroll-hint">SCROLL</div>
        </section>
      );
    }

    /* ── Services ────────────────────────────── */
    function Services() {
      return (
        <section className="services" id="services">
          <div className="services-header">
            <span className="section-tag">What We Do</span>
            <h2 className="section-title">
              Solutions Designed<br/><span>For Real Growth</span>
            </h2>
            <p className="section-sub" style={{ margin:'0 auto' }}>
              From strategy to execution, we offer end-to-end consulting that drives measurable impact across every dimension of your business.
            </p>
          </div>

          <div className="services-grid">
            {SERVICES.map(s => (
              <div className="service-card" key={s.title}>
                <div className="service-icon" style={{ background: s.color }}>
                  {s.icon}
                </div>
                <h3>{s.title}</h3>
                <p>{s.desc}</p>
                <span className="service-arrow">{s.tag}</span>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ── About ───────────────────────────────── */
    function About() {
      return (
        <section id="about" style={{ padding:'100px 5%' }}>
          <div className="about-grid">
            {/* Visual */}
            <div className="about-visual">
              <div className="about-blob">
                <div className="about-inner">
                  <div className="big-num">10+</div>
                  <p>Years of<br/>Excellence</p>
                  <div style={{ marginTop:'1rem', display:'flex', flexDirection:'column', gap:'.5rem' }}>
                    {[
                      { label:'Client Satisfaction', val:'94%', color:'var(--accent)' },
                      { label:'Projects Completed',  val:'320+', color:'var(--teal)'   },
                      { label:'Industries Served',   val:'30+',  color:'var(--green)'  },
                    ].map(m => (
                      <div key={m.label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'.4rem 0', borderBottom:'1px solid var(--border)' }}>
                        <span style={{ fontSize:'.78rem', color:'var(--muted)' }}>{m.label}</span>
                        <span style={{ fontSize:'.9rem', fontWeight:700, color:m.color }}>{m.val}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* Text */}
            <div>
              <span className="section-tag">About Us</span>
              <h2 className="section-title">
                More Than Consultants —<br/><span>Your Growth Partners</span>
              </h2>
              <p className="section-sub">
                We combine deep industry knowledge with a hands-on approach to drive real transformation. Our team of seasoned strategists, technologists, and marketers work as an extension of yours.
              </p>

              <div className="feature-list">
                {FEATURES.map(f => (
                  <div className="feature-item" key={f.title}>
                    <div className="feature-check">✓</div>
                    <div>
                      <h4>{f.title}</h4>
                      <p>{f.desc}</p>
                    </div>
                  </div>
                ))}
              </div>

              <div className="about-chips">
                {['Strategy','Consulting','Technology','Marketing','Analytics','Growth'].map(c => (
                  <span className="chip" key={c}>{c}</span>

    function Process() {
      return (
        <section className="process" id="process">
          <div className="process-header">
            <span className="section-tag">How We Work</span>
            <h2 className="section-title">

            </h2>
          </div>
          <div className="process-steps">
            {STEPS.map(s => (
              <div className="step-card" key={s.n}>

    function Testimonials() {
      return (

          <div className="testimonials-grid">
            {TESTIMONIALS.map(t => (
              <div className="testi-card" key={t.name}>
                <div className="stars">{'★'.repeat(t.stars)}</div>
                <p>{t.text}</p>
                <div className="testi-author">
                  <div className="author-avatar">{t.initials}</div>

                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ── Contact ─────────────────────────────── */
    function Contact() {
      const [form, setForm] = useState({ name:'', email:'', service:'', message:'' });
      const [sent, setSent] = useState(false);

      const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

      const submit = e => {
        e.preventDefault();
        setSent(true);
        setForm({ name:'', email:'', service:'', message:'' });
        setTimeout(() => setSent(false), 5000);
      };

      return (
        <section className="contact" id="contact">
          <div className="contact-wrap">
            {/* Info */}
            <div className="contact-info">
              <span className="section-tag">Get In Touch</span>
              <h2>Let's Build Something<br/><span style={{ background:'linear-gradient(135deg,var(--accent),var(--teal))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>Great Together</span></h2>
              <p>Ready to take your business to the next level? Reach out and let's discuss how we can help you achieve your goals faster.</p>

              {[
                { icon:'📧', title:'Email Us',      desc:'hello@kpz.com'          },
                { icon:'📞', title:'Call Us',       desc:'+1 (555) 000-0000'      },
                { icon:'📍', title:'Our Office',    desc:'123 Strategy Ave, NY'   },
                { icon:'🕐', title:'Business Hours',desc:'Mon–Fri, 9AM – 6PM EST' },
              ].map(c => (
                <div className="contact-item" key={c.title}>
                  <div className="contact-icon">{c.icon}</div>
                  <div><h4>{c.title}</h4><p>{c.desc}</p></div>
                </div>
              ))}
            </div>

            {/* Form */}
            <div className="contact-form">
              <h3 style={{ marginBottom:'1.5rem', fontWeight:700, fontSize:'1.2rem' }}>Send Us a Message</h3>
              <form onSubmit={submit}>
                <div className="form-row">
                  <div className="form-group">
                    <label>Full Name</label>
                    <input name="name" value={form.name} onChange={handle} placeholder="John Doe" required />
                  </div>
                  <div className="form-group">
                    <label>Email</label>
                    <input name="email" type="email" value={form.email} onChange={handle} placeholder="john@example.com" required />
                  </div>
                </div>
                <div className="form-group">
                  <label>Service Interested In</label>
                  <select name="service" value={form.service} onChange={handle}>
                    <option value="">Select a service...</option>
                    <option>Strategic Planning</option>
                    <option>Business Consulting</option>
                    <option>Technology Solutions</option>
                    <option>Digital Marketing</option>
                    <option>Risk Management</option>
                    <option>Data Analytics</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>Message</label>
                  <textarea name="message" value={form.message} onChange={handle} placeholder="Tell us about your project..." required />
                </div>
                <button type="submit" className="btn-submit">Send Message ✦</button>
                {sent && <div className="success-msg">✅ Message sent! We'll be in touch within 24 hours.</div>}
              </form>
            </div>
          </div>
        </section>
      );
