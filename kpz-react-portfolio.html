<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPZ | Frontend Developer</title>
  <meta name="description" content="Portfolio of KPZ — Frontend Developer specializing in HTML, CSS, JavaScript & React." />

  <!-- React + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone — transpiles JSX in-browser (no build step needed) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS RESET & VARIABLES ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --bg2:        #13161e;
      --bg3:        #1a1d28;
      --surface:    #1e2130;
      --border:     #2a2f45;
      --accent:     #6c63ff;
      --accent2:    #a78bfa;
      --accent3:    #38bdf8;
      --text:       #e8eaf0;
      --text2:      #9ba3b8;
      --text3:      #5c6480;
      --success:    #34d399;
      --warn:       #fbbf24;
      --red:        #f87171;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 8px 32px rgba(0,0,0,.45);
      --shadow-sm:  0 4px 16px rgba(0,0,0,.25);
      --glow:       0 0 24px rgba(108,99,255,.35);
    }

    /* ── LIGHT MODE ── */
    body.light {
      --bg:         #f5f7ff;
      --bg2:        #eef0fa;
      --bg3:        #e8ebf7;
      --surface:    #ffffff;
      --border:     #d0d4ed;
      --text:       #0d0f1e;
      --text2:      #4a5070;
      --text3:      #8890b0;
      --shadow:     0 8px 32px rgba(108,99,255,.12);
      --shadow-sm:  0 4px 16px rgba(108,99,255,.08);
      --glow:       0 0 24px rgba(108,99,255,.18);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      transition: background .3s, color .3s;
      overflow-x: hidden;
    }

    ::selection { background: var(--accent); color: #fff; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    /* ── UTILITY ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .section    { padding: 100px 0; }
    .section-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Fira Code', monospace; font-size: 13px;
      color: var(--accent); background: rgba(108,99,255,.12);
      border: 1px solid rgba(108,99,255,.25);
      padding: 4px 14px; border-radius: 99px; margin-bottom: 16px;
    }
    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800; letter-spacing: -.5px; line-height: 1.2;
      margin-bottom: 16px;
    }
    .section-sub {
      color: var(--text2); font-size: 17px; max-width: 560px;
      margin-bottom: 56px;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      transition: transform .25s, box-shadow .25s, border-color .25s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow), var(--glow);
      border-color: var(--accent);
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600;
      transition: all .25s; cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(108,99,255,.55);
    }
    .btn-outline {
      border: 1.5px solid var(--border); color: var(--text);
      background: var(--surface);
    }
    .btn-outline:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(108,99,255,.07);
    }

    /* ── NAVBAR ── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      transition: background .3s, backdrop-filter .3s, box-shadow .3s;
    }
    #navbar.scrolled {
      background: rgba(13,15,20,.88);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 var(--border);
    }
    body.light #navbar.scrolled {
      background: rgba(245,247,255,.88);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }
    .nav-logo {
      font-family: 'Fira Code', monospace; font-size: 20px;
      font-weight: 600; color: var(--accent);
      letter-spacing: 1px;
    }
    .nav-logo span { color: var(--text); }
    .nav-links {
      display: flex; align-items: center; gap: 8px; list-style: none;
    }
    .nav-links a {
      padding: 7px 14px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; color: var(--text2);
      transition: color .2s, background .2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--accent); background: rgba(108,99,255,.1);
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .theme-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all .2s;
    }
    .theme-btn:hover { border-color: var(--accent); }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      padding: 8px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
    }
    .hamburger span {
      width: 20px; height: 2px; background: var(--text);
      border-radius: 2px; transition: .3s;
    }
    .mobile-menu {
      display: none; position: fixed; top: 68px; left: 0; right: 0; z-index: 99;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 16px 24px; flex-direction: column; gap: 4px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 500; color: var(--text2);
      transition: color .2s, background .2s;
    }
    .mobile-menu a:hover { color: var(--accent); background: rgba(108,99,255,.1); }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(108,99,255,.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(56,189,248,.12) 0%, transparent 60%);
    }
    .hero-grid {
      position: absolute; inset: 0; pointer-events: none; opacity: .04;
      background-image:
        linear-gradient(var(--text) 1px, transparent 1px),
        linear-gradient(90deg, var(--text) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content {
      position: relative; text-align: center; z-index: 1;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Fira Code', monospace; font-size: 13px;
      color: var(--accent2); background: rgba(108,99,255,.1);
      border: 1px solid rgba(108,99,255,.2); padding: 6px 18px;
      border-radius: 99px; margin-bottom: 28px;
    }
    .hero-badge::before {
      content: ''; width: 8px; height: 8px; background: var(--success);
      border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .4; }
    }
    .hero-name {
      font-size: clamp(42px, 8vw, 82px);
      font-weight: 800; letter-spacing: -2px; line-height: 1.05;
      margin-bottom: 20px;
    }
    .hero-role {
      font-family: 'Fira Code', monospace;
      font-size: clamp(16px, 2.5vw, 22px);
      color: var(--text2); margin-bottom: 24px;
      min-height: 34px;
    }
    .cursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--accent); margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .hero-desc {
      color: var(--text2); font-size: 17px; max-width: 520px;
      margin: 0 auto 40px;
    }
    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .hero-scroll {
      position: absolute; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; color: var(--text3); font-size: 12px;
      font-family: 'Fira Code', monospace; letter-spacing: 1px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100%{transform:translateX(-50%) translateY(0)}
      50%{transform:translateX(-50%) translateY(-8px)}
    }
    .hero-scroll::after {
      content: ''; display: block; width: 1px; height: 40px;
      background: linear-gradient(var(--accent), transparent);
    }

    /* ── ABOUT ── */
    #about .about-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
      align-items: center;
    }
    .about-img-wrap {
      position: relative; aspect-ratio: 1/1; max-width: 400px;
    }
    .about-img-bg {
      position: absolute; inset: 0; border-radius: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      opacity: .15; transform: rotate(4deg);
    }
    .about-img-inner {
      position: relative; width: 100%; height: 100%;
      border-radius: 20px; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 96px;
    }
    .about-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-top: 32px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
    }
    .stat-num {
      font-size: 32px; font-weight: 800; color: var(--accent);
      font-family: 'Fira Code', monospace;
    }
    .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .about-text p { color: var(--text2); margin-bottom: 16px; line-height: 1.8; }
    .info-list { list-style: none; margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    .info-list li {
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; color: var(--text2);
    }
    .info-list li strong { color: var(--text); min-width: 80px; }
    .info-list li span.dot {
      width: 6px; height: 6px; background: var(--accent);
      border-radius: 50%; flex-shrink: 0;
    }
    @media (max-width: 768px) {
      #about .about-grid { grid-template-columns: 1fr; }
      .about-img-wrap { max-width: 280px; margin: 0 auto; }
    }

    /* ── SKILLS ── */
    #skills { background: var(--bg2); }
    .skills-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    .skill-category { /* card styles already applied */ }
    .skill-cat-title {
      font-size: 13px; font-family: 'Fira Code', monospace;
      color: var(--accent); letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .skill-cat-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .skill-item { margin-bottom: 16px; }
    .skill-head {
      display: flex; justify-content: space-between;
      font-size: 14px; font-weight: 500; margin-bottom: 6px;
    }
    .skill-pct { font-family: 'Fira Code', monospace; color: var(--accent); font-size: 12px; }
    .skill-bar {
      height: 5px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .skill-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      transition: width 1.2s cubic-bezier(.25,.46,.45,.94);
    }
    .tech-pills {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px;
    }
    .pill {
      padding: 6px 16px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 13px; font-weight: 500; color: var(--text2);
      transition: all .2s; cursor: default;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.react  { border-color: rgba(56,189,248,.4); color: #38bdf8; background: rgba(56,189,248,.07); }
    .pill.html   { border-color: rgba(251,113,133,.4); color: #fb7185; background: rgba(251,113,133,.07); }
    .pill.css    { border-color: rgba(129,140,248,.4); color: #818cf8; background: rgba(129,140,248,.07); }
    .pill.js     { border-color: rgba(251,191,36,.4);  color: #fbbf24; background: rgba(251,191,36,.07); }
    .pill.git    { border-color: rgba(248,113,113,.4); color: #f87171; background: rgba(248,113,113,.07); }
    .pill.figma  { border-color: rgba(167,139,250,.4); color: #a78bfa; background: rgba(167,139,250,.07); }
    .pill.vscode { border-color: rgba(52,211,153,.4);  color: #34d399; background: rgba(52,211,153,.07); }

    /* ── PROJECTS ── */
    .projects-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }
    .project-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      display: flex; flex-direction: column;
    }
    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow), var(--glow);
      border-color: var(--accent);
    }
    .project-thumb {
      height: 180px; display: flex; align-items: center; justify-content: center;
      font-size: 56px; position: relative; overflow: hidden;
    }
    .project-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, var(--surface));
    }
    .project-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .project-tags {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .project-tag {
      font-size: 11px; font-family: 'Fira Code', monospace;
      padding: 2px 10px; border-radius: 99px;
      background: rgba(108,99,255,.12); color: var(--accent2);
      border: 1px solid rgba(108,99,255,.2);
    }
    .project-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .project-desc { font-size: 14px; color: var(--text2); flex: 1; line-height: 1.7; }
    .project-links {
      display: flex; gap: 10px; margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .project-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; color: var(--text2);
      padding: 7px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .project-link:hover { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,.07); }
    .featured-badge {
      position: absolute; top: 12px; right: 12px; z-index: 2;
      font-size: 10px; font-family: 'Fira Code', monospace;
      padding: 3px 10px; border-radius: 99px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff; letter-spacing: .5px;
    }

    /* ── CONTACT ── */
    #contact { background: var(--bg2); }
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
      align-items: start;
    }
    .contact-info h3 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .contact-info p { color: var(--text2); line-height: 1.8; margin-bottom: 28px; }
    .contact-links { display: flex; flex-direction: column; gap: 12px; }
    .contact-link-item {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 18px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
      transition: all .2s; text-decoration: none; color: var(--text);
    }
    .contact-link-item:hover { border-color: var(--accent); background: rgba(108,99,255,.06); }
    .contact-link-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; background: rgba(108,99,255,.12);
      flex-shrink: 0;
    }
    .contact-link-text { font-size: 14px; }
    .contact-link-text strong { display: block; font-weight: 600; }
    .contact-link-text span { color: var(--text2); font-size: 13px; }

    .contact-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 600; color: var(--text2); }
    .form-group input, .form-group textarea {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 16px;
      color: var(--text); font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .2s;
      resize: vertical;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-status {
      padding: 10px 16px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500;
    }
    .form-status.success { background: rgba(52,211,153,.1); color: var(--success); border: 1px solid rgba(52,211,153,.3); }
    .form-status.error   { background: rgba(248,113,113,.1); color: var(--red);     border: 1px solid rgba(248,113,113,.3); }
    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* ── FOOTER ── */
    footer {
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 32px 0; text-align: center;
    }
    .footer-inner {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-logo { font-family: 'Fira Code', monospace; font-size: 18px; color: var(--accent); }
    .footer-copy { font-size: 13px; color: var(--text3); }
    .footer-socials { display: flex; gap: 10px; }
    .social-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all .2s; color: var(--text2);
    }
    .social-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    /* ── BACK TO TOP ── */
    .back-top {
      position: fixed; bottom: 28px; right: 28px;
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff; border: none; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(108,99,255,.45);
      cursor: pointer; transition: all .25s; z-index: 50;
      opacity: 0; pointer-events: none;
    }
    .back-top.visible { opacity: 1; pointer-events: auto; }
    .back-top:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(108,99,255,.6); }

    /* ── FADE-IN ANIMATION ── */
    .fade-in { opacity: 0; transform: translateY(30px); transition: opacity .7s ease, transform .7s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── PROGRESS BAR ── */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 200;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      transition: width .1s;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="progress-bar" style="width:0%"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── DATA ─── */
    const NAV_LINKS = ['About','Skills','Projects','Contact'];

    const SKILLS = [
      {
        cat: '// Frontend',
        items: [
          { name: 'HTML5', pct: 95 },
          { name: 'CSS3 / SCSS', pct: 90 },
          { name: 'JavaScript (ES6+)', pct: 85 },
          { name: 'React.js', pct: 78 },
        ]
      },
      {
        cat: '// Tools & Others',

    /* ─── TYPING HOOK ─── */
    function useTyping(phrases, speed = 80, pause = 1800) {
      const [text, setText] = useState('');
      const [idx, setIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);
      const [blink, setBlink] = useState(true);

      useEffect(() => {
        const phrase = phrases[idx % phrases.length];
        let timer;
        if (!deleting && text === phrase) {
          timer = setTimeout(() => setDeleting(true), pause);
        } else if (deleting && text === '') {
          setDeleting(false);
          setIdx(i => i + 1);
        } else {
          timer = setTimeout(() => {
            setText(prev =>
              deleting ? prev.slice(0, -1) : phrase.slice(0, prev.length + 1)
            );
          }, deleting ? speed / 2 : speed);
        }
        return () => clearTimeout(timer);
      }, [text, deleting, idx, phrases, speed, pause]);

      return text;
    }

    /* ─── INTERSECTION OBSERVER HOOK ─── */
    function useFadeIn() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.12 });
        el.querySelectorAll('.fade-in').forEach(node => obs.observe(node));
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    /* ─── SKILL BAR ─── */

      const ref = useRef(null);

        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setWidth(pct); obs.disconnect(); }
        }, { threshold: .4 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, [pct]);
      return (
        <div className="skill-item" ref={ref}>
          <div className="skill-head">
            <span>{name}</span>
            <span className="skill-pct">{pct}%</span>
          </div>
          <div className="skill-bar">

        </div>
      );
    }

    /* ─── CONTACT ─── */
    function Contact() {
      const ref = useFadeIn();
      const [form, setForm] = useState({ name: '', email: '', subject: '', message: '' });

        }
        /* 
          💡 TO ENABLE REAL EMAIL: replace with Formspree, EmailJS, or Netlify Forms.
          For Netlify Forms, add data-netlify="true" to <form> and remove this JS handler.

                    <label>Name *</label>
